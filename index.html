<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏃 러닝 트래커 — 월 100km 도전</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --border: rgba(0,0,0,0.08);
    --text: #1a1a1a;
    --text2: #666;
    --text3: #999;
    --green: #1D9E75;
    --green-light: #5DCAA5;
    --green-pale: #E1F5EE;
    --amber: #BA7517;
    --amber-pale: #FAEEDA;
    --red: #A32D2D;
    --red-pale: #FCEBEB;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 20px 60px;
  }

  header {
    max-width: 680px;
    margin: 0 auto 32px;
  }

  header h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }

  header p {
    font-size: 14px;
    color: var(--text2);
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 20px 24px;
    border: 1px solid var(--border);
  }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
  }

  .stat {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 6px;
    letter-spacing: 0.2px;
  }

  .stat-value {
    font-size: 22px;
    font-weight: 700;
    font-family: 'DM Mono', monospace;
    color: var(--text);
    line-height: 1;
  }

  .stat-value span {
    font-size: 13px;
    font-weight: 400;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text2);
    margin-left: 2px;
  }

  .stat-sub {
    font-size: 11px;
    color: var(--text3);
    margin-top: 5px;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 10px;
  }

  .progress-label strong {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    font-family: 'DM Mono', monospace;
  }

  .progress-bg {
    background: var(--surface2);
    border-radius: 999px;
    height: 20px;
    overflow: hidden;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, #1D9E75, #5DCAA5);
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    position: relative;
  }

  .progress-pace {
    position: absolute;
    top: 0;
    height: 100%;
    border-right: 2px dashed rgba(0,0,0,0.25);
    pointer-events: none;
  }

  .pace-note {
    font-size: 12px;
    color: var(--text3);
    margin-top: 8px;
    text-align: right;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .input-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .input-group label {
    font-size: 12px;
    color: var(--text2);
  }

  .input-group input {
    height: 38px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    padding: 0 12px;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-group input:focus {
    border-color: var(--green);
  }

  .add-btn {
    height: 38px;
    padding: 0 20px;
    border-radius: var(--radius-sm);
    border: none;
    background: var(--green);
    color: #fff;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s, transform 0.1s;
  }

  .add-btn:hover { background: #0F6E56; }
  .add-btn:active { transform: scale(0.97); }

  .section-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 14px;
    letter-spacing: 0.2px;
  }

  .badge {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 500;
  }
  .badge-green { background: var(--green-pale); color: #0F6E56; }
  .badge-amber { background: var(--amber-pale); color: var(--amber); }
  .badge-red { background: var(--red-pale); color: var(--red); }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  th {
    color: var(--text3);
    font-weight: 400;
    text-align: left;
    padding: 4px 8px 10px;
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 9px 8px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }

  tr:last-child td { border-bottom: none; }

  .del-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    font-size: 16px;
    padding: 0 4px;
    transition: color 0.15s;
  }

  .del-btn:hover { color: var(--red); }

  .empty-msg {
    font-size: 13px;
    color: var(--text3);
    text-align: center;
    padding: 24px 0;
  }

  @media (max-width: 500px) {
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
    .input-row { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<header>
  <h1>🏃 월간 러닝 트래커</h1>
  <p>이번 달 100km 목표 달성을 향해 달려봐요</p>
</header>

<div class="container">
  <div class="stat-grid" id="statGrid"></div>

  <div class="card">
    <div class="progress-label">
      <span id="progressText">0km / 100km</span>
      <strong id="progressPct">0%</strong>
    </div>
    <div class="progress-bg">
      <div class="progress-fill" id="barFill" style="width:0%;"></div>
      <div class="progress-pace" id="paceLine" style="left:0%;"></div>
    </div>
    <div class="pace-note" id="paceLabel"></div>
  </div>

  <div class="card">
    <div class="input-row">
      <div class="input-group">
        <label>날짜</label>
        <input type="date" id="dateInput">
      </div>
      <div class="input-group" style="max-width:130px;">
        <label>거리 (km)</label>
        <input type="number" id="kmInput" min="0.1" max="50" step="0.1" placeholder="예: 5.2">
      </div>
      <button class="add-btn" onclick="addRun()">+ 기록 추가</button>
    </div>
  </div>

  <div class="card">
    <div class="section-title">일별 달린 거리 & 누적 거리</div>
    <div style="position:relative;height:200px;">
      <canvas id="runChart" role="img" aria-label="일별 러닝 거리 및 누적 거리 차트"></canvas>
    </div>
    <div style="display:flex;gap:16px;margin-top:12px;font-size:12px;color:var(--text2);">
      <span style="display:flex;align-items:center;gap:5px;"><span style="width:10px;height:10px;border-radius:2px;background:#1D9E75;"></span>일별 거리</span>
      <span style="display:flex;align-items:center;gap:5px;"><span style="width:10px;height:10px;border-radius:2px;background:#5DCAA5;"></span>누적 거리</span>
    </div>
  </div>

  <div class="card">
    <div class="section-title">기록 목록</div>
    <div id="logBody"></div>
  </div>
</div>

<script>
const GOAL = 100;
const STORAGE_KEY = 'running_tracker_v1';
let runs = [];
let chart = null;

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) runs = JSON.parse(raw);
  } catch(e) { runs = []; }
  setDefaultDate();
  render();
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(runs));
}

function setDefaultDate() {
  document.getElementById('dateInput').value = new Date().toISOString().slice(0,10);
}

function getCurrentMonthInfo() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const today = now.getDate();
  return { year, month, daysInMonth, today };
}

function getMonthRuns() {
  const { year, month } = getCurrentMonthInfo();
  return runs.filter(r => {
    const d = new Date(r.date);
    return d.getFullYear() === year && d.getMonth() === month;
  });
}

function addRun() {
  const dateVal = document.getElementById('dateInput').value;
  const kmVal = parseFloat(document.getElementById('kmInput').value);
  if (!dateVal) { alert('날짜를 선택해주세요.'); return; }
  if (isNaN(kmVal) || kmVal <= 0) { alert('거리를 입력해주세요.'); return; }
  runs.push({ date: dateVal, km: Math.round(kmVal * 10) / 10 });
  runs.sort((a,b) => a.date.localeCompare(b.date));
  document.getElementById('kmInput').value = '';
  saveData();
  render();
}

function deleteRun(origIdx) {
  const monthRuns = getMonthRuns();
  const target = monthRuns[origIdx];
  const gi = runs.findIndex(r => r.date === target.date && r.km === target.km);
  if (gi > -1) runs.splice(gi, 1);
  saveData();
  render();
}

function render() {
  const { daysInMonth, today } = getCurrentMonthInfo();
  const monthRuns = getMonthRuns();
  const total = monthRuns.reduce((s, r) => s + r.km, 0);
  const totalR = Math.round(total * 10) / 10;
  const pct = Math.min(100, Math.round((total / GOAL) * 100));
  const remaining = Math.max(0, Math.round((GOAL - total) * 10) / 10);
  const daysLeft = daysInMonth - today;
  const paceNeeded = daysLeft > 0 ? Math.round((remaining / daysLeft) * 10) / 10 : 0;
  const pacePct = Math.min(100, Math.round((today / daysInMonth) * 100));
  const expectedByNow = Math.round((GOAL / daysInMonth * today) * 10) / 10;
  const diff = Math.round((total - expectedByNow) * 10) / 10;

  let badge = '';
  if (pct >= 100) badge = '<span class="badge badge-green">🎉 목표 달성!</span>';
  else if (diff >= 0) badge = '<span class="badge badge-green">앞서가는 중</span>';
  else if (diff >= -5) badge = '<span class="badge badge-amber">소폭 지연</span>';
  else badge = '<span class="badge badge-red">분발 필요</span>';

  document.getElementById('statGrid').innerHTML = `
    <div class="stat"><div class="stat-label">이번 달 합계</div><div class="stat-value">${totalR}<span>km</span></div><div class="stat-sub">${badge}</div></div>
    <div class="stat"><div class="stat-label">달성률</div><div class="stat-value">${pct}<span>%</span></div><div class="stat-sub">${totalR}km / ${GOAL}km</div></div>
    <div class="stat"><div class="stat-label">남은 거리</div><div class="stat-value">${remaining}<span>km</span></div><div class="stat-sub">D-${daysLeft} 남음</div></div>
    <div class="stat"><div class="stat-label">일 평균 필요</div><div class="stat-value">${paceNeeded}<span>km</span></div><div class="stat-sub">앞으로 하루하루</div></div>
  `;

  document.getElementById('progressText').textContent = `${totalR}km / ${GOAL}km`;
  document.getElementById('progressPct').textContent = `${pct}%`;
  document.getElementById('barFill').style.width = pct + '%';
  document.getElementById('paceLine').style.left = pacePct + '%';
  document.getElementById('paceLabel').textContent = `오늘 기준 예상 누적: ${expectedByNow}km (현재 ${diff >= 0 ? '+' : ''}${diff}km)`;

  renderChart(monthRuns, daysInMonth);
  renderLog(monthRuns);
}

function renderChart(monthRuns, daysInMonth) {
  const dayMap = {};
  monthRuns.forEach(r => {
    const d = parseInt(r.date.slice(8));
    dayMap[d] = (dayMap[d] || 0) + r.km;
  });
  const labels = [], dailyData = [], cumData = [];
  let cum = 0;
  for (let d = 1; d <= daysInMonth; d++) {
    labels.push(d + '일');
    const km = dayMap[d] || 0;
    cum += km;
    dailyData.push(Math.round(km * 10) / 10);
    cumData.push(Math.round(cum * 10) / 10);
  }
  const ctx = document.getElementById('runChart').getContext('2d');
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    data: {
      labels,
      datasets: [
        { type: 'bar', label: '일별 거리', data: dailyData, backgroundColor: '#1D9E75', borderRadius: 4, yAxisID: 'y' },
        { type: 'line', label: '누적 거리', data: cumData, borderColor: '#5DCAA5', backgroundColor: 'rgba(93,202,165,0.08)', fill: true, tension: 0.3, pointRadius: 2, borderWidth: 2, yAxisID: 'y2' }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => `${c.dataset.label}: ${c.parsed.y}km` } } },
      scales: {
        x: { ticks: { autoSkip: true, maxTicksLimit: 10, font: { size: 11 }, color: '#999' }, grid: { display: false }, border: { display: false } },
        y: { position: 'left', ticks: { font: { size: 11 }, color: '#999', callback: v => v + 'km' }, grid: { color: 'rgba(0,0,0,0.05)' }, border: { display: false } },
        y2: { position: 'right', ticks: { font: { size: 11 }, color: '#5DCAA5', callback: v => v + 'km' }, grid: { drawOnChartArea: false }, border: { display: false }, max: 100 }
      }
    }
  });
}

function renderLog(monthRuns) {
  const container = document.getElementById('logBody');
  if (!monthRuns.length) {
    container.innerHTML = '<div class="empty-msg">아직 기록이 없어요. 오늘 달린 거리를 입력해보세요!</div>';
    return;
  }
  let cum = 0;
  const cumMap = monthRuns.map(r => { cum += r.km; return Math.round(cum * 10) / 10; });
  const reversed = [...monthRuns].map((r, i) => ({ ...r, cumIdx: i })).reverse();
  let html = `<table><thead><tr><th>날짜</th><th>거리</th><th>누적</th><th></th></tr></thead><tbody>`;
  reversed.forEach(r => {
    const d = new Date(r.date);
    html += `<tr>
      <td>${d.getMonth()+1}/${d.getDate()}</td>
      <td style="font-weight:500;font-family:'DM Mono',monospace;">${r.km}km</td>
      <td style="color:var(--text2);font-family:'DM Mono',monospace;">${cumMap[r.cumIdx]}km</td>
      <td><button class="del-btn" onclick="deleteRun(${r.cumIdx})" title="삭제">✕</button></td>
    </tr>`;
  });
  html += '</tbody></table>';
  container.innerHTML = html;
}

loadData();
</script>
</body>
</html>
